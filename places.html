<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barcha Tarixiy Joylar</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <header class="bg-green-700 shadow-lg py-6 px-4">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between"
      >
        <a
          href="index.html"
          class="text-white font-bold hover:underline mb-4 md:mb-0"
        >
          &larr; Asosiy sahifa
        </a>
        <h1 class="text-white text-2xl md:text-3xl font-extrabold text-center">
          O'zbekistonning barcha qadamjolari
        </h1>
        <div class="hidden md:block w-24"></div>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 mt-6">
      <div
        class="bg-white p-4 rounded-xl shadow-sm flex flex-col md:flex-row items-center gap-4"
      >
        <div
          class="flex flex-col md:flex-row items-center gap-2 w-full md:w-auto"
        >
          <label
            for="region-filter"
            class="font-bold text-gray-700 whitespace-nowrap"
            >Viloyatni tanlang:</label
          >
          <select
            id="region-filter"
            class="p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none w-full md:w-48"
          >
            <option value="all">Barchasi</option>
            <option value="Samarqand">Samarqand</option>
            <option value="Buxoro">Buxoro</option>
            <option value="Xorazm">Xorazm</option>
            <option value="Surxondaryo">Surxondaryo</option>
          </select>
        </div>

        <div
          class="flex flex-col md:flex-row items-center gap-2 w-full flex-grow"
        >
          <label
            for="search-input"
            class="font-bold text-gray-700 whitespace-nowrap"
            >Nomini qidirish:</label
          >
          <input
            type="text"
            id="search-input"
            placeholder="Masalan: Registon..."
            class="p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none w-full"
          />
        </div>
      </div>
    </div>

    <main class="max-w-7xl mx-auto py-10 px-4">
      <div
        id="all-places-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
      ></div>
    </main>

    <script src="js/main.js"></script>
    <script>
      window.onload = () => {
        if (typeof loadAllPlaces === "function") {
          loadAllPlaces();
        }
      };
    </script>
  </body>
</html>
